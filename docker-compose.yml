services:
  # Valhalla Routing Engine
  valhalla:
    build:
      context: ./docker/valhalla
      dockerfile: Dockerfile
    container_name: school-route-planner-valhalla
    # ホストへのポート公開はgateway経由のアクセスに統一するため削除
    # 直接アクセスが必要な場合は下記をコメントアウト解除
    # ports:
    #   - "${VALHALLA_PORT:-8002}:8002"
    networks:
      - school-route-planner-network
    restart: unless-stopped

  # nginx Gateway（開発時検証用・本番構成に近い経路でAPIにアクセスする場合に使用）
  gateway:
    image: nginx:alpine
    container_name: school-route-planner-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./docker/gateway/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - valhalla
    networks:
      - school-route-planner-network
    restart: unless-stopped

networks:
  school-route-planner-network:
    driver: bridge
