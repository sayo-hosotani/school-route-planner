app = 'school-route-planner-valhalla-api'
primary_region = 'nrt'

# http_service を設定しないことで外部HTTPSエンドポイントを廃止し、
# Fly.io プライベートネットワーク（6PN）経由のアクセスのみ許可する。
# nginx gateway は school-route-planner-valhalla-api.internal:8002 で到達する。

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
